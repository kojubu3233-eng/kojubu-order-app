<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>코주부씨앤에프 · 발주 앱 프로토타입</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --bg:#eef1ef;
    --ink:#1c2b2e;
    --navy:#153548;
    --navy-dim:#2c4f63;
    --coral:#d6472b;
    --coral-dim:#f0d9d3;
    --sage:#6f8f68;
    --sand:#f4efe4;
    --card:#ffffff;
    --line:#dde2de;
    --muted:#6b7a78;
  }
  *{box-sizing:border-box;}
  html,body{height:auto;min-height:100%;}
  body{margin:0;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);display:flex;justify-content:center;align-items:flex-start;padding:28px 12px;overflow-y:auto;}
  .stage{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .stage-label{font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700;}

  .phone{
    width:380px;height:790px;background:var(--card);
    border-radius:34px;border:1px solid #cfd6d1;
    box-shadow:0 30px 60px -20px rgba(21,53,72,.35), 0 2px 0 rgba(255,255,255,.6) inset;
    overflow:hidden;position:relative;display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:22px;background:var(--ink);border-radius:0 0 14px 14px;z-index:50;}

  .screen{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;padding-top:26px;}
  .screen::-webkit-scrollbar{width:0;}
  .screen > *{flex-shrink:0;}

  .wave{width:100%;height:10px;display:block;}
  .wave path{fill:var(--sand);}

  .topbar{padding:6px 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:nowrap;gap:6px;}
  .brand{font-family:'Noto Serif KR',serif;font-weight:700;font-size:16px;color:var(--navy);letter-spacing:-.01em;display:flex;align-items:center;gap:6px;white-space:nowrap;flex:0 0 auto;cursor:pointer;}
  .brand-name span{color:var(--coral);}
  .logo-mark{width:28px;height:28px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .logo-mark img{width:100%;height:100%;object-fit:contain;display:block;}
  .social{display:flex;gap:5px;flex:0 0 auto;}
  .social a{width:20px;height:20px;border-radius:50%;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--navy);border:1px solid var(--line);text-decoration:none;font-weight:700;}
  .admin-link{font-size:9.5px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:4px 8px;background:#fff;cursor:pointer;white-space:nowrap;flex:0 0 auto;}
  .datasrc{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .datasrc.live{background:#2f7d4f;}
  .datasrc.offline{background:#c99a2e;}
  .datasrc.loading{background:var(--muted);}

  .banner{margin:4px 18px 14px;border-radius:16px;overflow:hidden;position:relative;height:130px;background:linear-gradient(135deg,var(--navy),var(--navy-dim));}
  .banner-slide{position:absolute;inset:0;padding:18px;display:flex;flex-direction:column;justify-content:center;color:#fff;opacity:0;transition:opacity .4s ease;background-size:cover;background-position:center;}
  .banner-slide.has-img::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(21,53,72,.15),rgba(21,53,72,.75));z-index:0;}
  .banner-slide.has-img .banner-eyebrow,.banner-slide.has-img .banner-title{position:relative;z-index:1;}
  .banner-slide.active{opacity:1;}
  .banner-eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#f3c9bd;font-weight:700;margin-bottom:6px;}
  .banner-title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;line-height:1.3;}
  .banner-dots{position:absolute;bottom:10px;left:18px;display:flex;gap:5px;}
  .banner-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;}
  .banner-dots span.active{background:#fff;}

  .cats{display:flex;flex-wrap:nowrap;align-items:center;gap:7px;padding:0 18px 14px;box-sizing:border-box;width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  .section-title{padding:0 18px 8px;font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .section-title .st-left{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .section-title small{font-weight:400;color:var(--muted);font-size:11px;}
  .st-controls{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .view-toggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:0 0 auto;}
  .view-toggle button{width:26px;height:26px;border:none;background:#fff;color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .view-toggle button.active{background:var(--navy);color:#fff;}
  .view-toggle button+button{border-left:1px solid var(--line);}
  .pagesize-select{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--navy);font-size:11px;font-weight:600;padding:4px 6px;font-family:inherit;height:26px;}

  .list{display:flex;flex-direction:column;gap:10px;padding:0 18px 18px;}
  .litem{display:flex;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;cursor:pointer;align-items:center;}
  .litem:active{transform:scale(.98);}
  .lithumb{width:64px;height:64px;border-radius:11px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;overflow:hidden;position:relative;}
  .lithumb img{width:100%;height:100%;object-fit:cover;}
  .liinfo{flex:1;min-width:0;}
  .listorage{font-size:9px;font-weight:700;color:var(--navy);background:var(--sand);display:inline-block;padding:2px 6px;border-radius:6px;margin-bottom:4px;}

  .pagination{display:flex;align-items:center;justify-content:center;gap:14px;padding:4px 18px 22px;}
  .pagination button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--navy);font-size:13px;cursor:pointer;}
  .pagination button:disabled{opacity:.35;cursor:default;}
  .pagination .pg-label{font-size:11.5px;color:var(--muted);font-weight:600;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px 18px;}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s ease;}
  .pcard:active{transform:scale(.97);}
  .pthumb{height:92px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;overflow:hidden;}
  .pthumb img{width:100%;height:100%;object-fit:cover;}
  .badge{position:absolute;top:6px;left:6px;background:var(--coral);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;z-index:2;}
  .storagetag{position:absolute;top:6px;right:6px;background:rgba(21,53,72,.82);color:#fff;font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:8px;z-index:2;}
  .storagetag.tag-best{background:var(--coral);}
  .storagetag.tag-recommend{background:var(--sage);}
  .storagetag.tag-default{background:rgba(21,53,72,.82);}
  .listorage.tag-best{background:var(--coral-dim);color:var(--coral);}
  .listorage.tag-recommend{background:#e4ecdf;color:var(--sage);}
  .listorage.tag-default{background:var(--sand);color:var(--navy);}
  .pinfo{padding:9px 10px 11px;}
  .pname{font-size:12.5px;font-weight:700;line-height:1.35;margin-bottom:2px;}
  .pspec{font-size:10.5px;color:var(--muted);margin-bottom:6px;}
  .pprice{font-size:13px;font-weight:900;color:var(--navy);}
  .pprice small{font-weight:500;color:var(--muted);font-size:10px;}

  .navbar{display:flex;border-top:1px solid var(--line);background:#fff;padding:9px 0 12px;flex-shrink:0;}
  .navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;color:var(--muted);cursor:pointer;font-weight:500;}
  .navitem.active{color:var(--coral);font-weight:700;}
  .navitem .ico{font-size:16px;}
  .cart-count{position:relative;}
  .cart-count .dot{position:absolute;top:-4px;right:-8px;background:var(--coral);color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}

  .detail-hero{height:180px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:52px;margin:0 0 4px;overflow:hidden;}
  .detail-hero img{width:100%;height:100%;object-fit:cover;}
  .back{position:absolute;top:14px;left:14px;z-index:5;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.1);}
  .detail-body{padding:16px 18px 10px;}
  .detail-cat{font-size:10.5px;color:var(--sage);font-weight:700;letter-spacing:.04em;margin-bottom:4px;}
  .detail-name{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;margin-bottom:4px;}
  .detail-spec{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .detail-meta{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.7;}
  .detail-meta b{color:var(--ink);font-weight:700;}
  .detail-price{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:16px;}
  .detail-price small{font-size:11px;color:var(--muted);font-weight:500;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--navy);margin-bottom:7px;}
  .stepper{display:flex;align-items:center;gap:0;width:fit-content;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .stepper button{width:38px;height:38px;border:none;background:var(--sand);font-size:16px;color:var(--navy);cursor:pointer;font-weight:700;}
  .stepper input{width:52px;height:38px;border:none;text-align:center;font-size:14px;font-weight:700;font-family:inherit;border-left:1px solid var(--line);border-right:1px solid var(--line);}
  .datefield{display:flex;gap:8px;align-items:stretch;}
  .dateinput{flex:1;min-width:0;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-family:inherit;color:var(--ink);}
  .date-pick-wrap{position:relative;flex:0 0 auto;width:42px;height:42px;}
  .date-pick-btn{width:42px;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--sand);font-size:16px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .date-pick-native{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;padding:0;margin:0;cursor:pointer;}
  .dateinput{height:42px;}
  .timerow{display:flex;gap:8px;}
  .timeselect{flex:1;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;height:42px;}

  .ordertype-group{display:flex;gap:10px;}
  .ordertype-option{flex:1;display:flex;align-items:center;gap:9px;border:1.5px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;background:#fff;}
  .ordertype-option.active{border-color:var(--navy);background:var(--sand);}
  .ordertype-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;position:relative;background:#fff;}
  .ordertype-option.active .ordertype-dot{border-color:var(--navy);}
  .ordertype-option.active .ordertype-dot::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--navy);}
  .ordertype-label{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.3;}
  .ordertype-desc{font-size:9.5px;color:var(--muted);margin-top:1px;}
  .ordertype-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-right:6px;vertical-align:middle;}
  .ordertype-badge.planned{background:var(--sand);color:var(--navy);}
  .ordertype-badge.confirmed{background:var(--coral-dim);color:var(--coral);}
  .astatus.done{background:#e4ecdf;color:var(--sage);}
  .admin-select-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 18px 12px;}
  .admin-select-left{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--navy);font-weight:600;cursor:pointer;}
  .admin-select-left input{width:16px;height:16px;}
  .admin-confirm-btn{flex:0 0 auto;padding:9px 14px;border-radius:10px;border:none;background:var(--navy);color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
  .admin-confirm-btn:disabled{opacity:.4;cursor:default;}
  .aitem-check{display:flex;align-items:flex-start;gap:9px;}
  .aitem-check input{width:17px;height:17px;margin-top:2px;flex:0 0 auto;}
  .hint{font-size:10.5px;color:var(--muted);margin-top:6px;}

  .btnrow{display:flex;gap:8px;padding:6px 18px 18px;margin-top:auto;}
  .btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-outline{background:#fff;border:1.5px solid var(--navy);color:var(--navy);}
  .btn-solid{background:var(--coral);color:#fff;}
  .btn-full{width:100%;}

  .cartlist{padding:4px 18px;display:flex;flex-direction:column;gap:10px;}
  .citem{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;}
  .citem-top{display:flex;gap:10px;}
  .citem-bottom{display:flex;justify-content:flex-end;margin-top:10px;}
  .cthumb{width:48px;height:48px;border-radius:9px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;overflow:hidden;cursor:pointer;}
  .cthumb img{width:100%;height:100%;object-fit:cover;}
  .cinfo{flex:1;min-width:0;}
  .cname{font-size:12.5px;font-weight:700;margin-bottom:2px;cursor:pointer;}
  .cmeta{font-size:10.5px;color:var(--muted);margin-bottom:4px;}
  .cmeta b{color:var(--navy);}
  .cremove-x{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--sand);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;}
  .cremove-x:active{background:var(--coral-dim);color:var(--coral);}
  .mini-stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .mini-stepper button{width:30px;height:30px;border:none;background:var(--sand);font-size:14px;color:var(--navy);cursor:pointer;font-weight:700;}
  .mini-stepper input{width:42px;height:30px;border:none;text-align:center;font-size:12.5px;font-weight:700;font-family:inherit;border-left:1px solid var(--line);border-right:1px solid var(--line);}
  .empty{padding:60px 30px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;}
  .empty .big{font-size:34px;margin-bottom:10px;}

  .cart-summary{padding:14px 18px;border-top:1px solid var(--line);background:#fff;}
  .sumrow{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .sumrow.total{font-size:14px;font-weight:900;color:var(--navy);}

  .toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:12px;font-size:12px;font-weight:600;box-shadow:0 10px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:all .25s ease;z-index:100;white-space:nowrap;display:flex;align-items:center;gap:7px;}

  .order-modal-overlay{position:absolute;inset:0;background:rgba(21,53,72,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;box-sizing:border-box;}
  .order-modal{background:#fff;border-radius:18px;width:100%;max-width:320px;max-height:80%;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.3);}
  .order-modal-head{padding:18px 18px 10px;flex:0 0 auto;}
  .order-modal-head h3{margin:0 0 4px;font-family:'Noto Serif KR',serif;font-size:16px;color:var(--navy);}
  .order-modal-head p{margin:0;font-size:11.5px;color:var(--muted);}
  .order-modal-body{padding:0 18px;overflow-y:auto;flex:1 1 auto;display:flex;flex-direction:column;gap:8px;}
  .order-modal-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .order-modal-item:last-child{border-bottom:none;}
  .order-modal-item-name{font-size:12.5px;font-weight:600;color:var(--ink);}
  .order-modal-item-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .order-modal-item-qty{font-size:12.5px;font-weight:700;color:var(--navy);white-space:nowrap;flex:0 0 auto;}
  .order-modal-total{display:flex;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--line);font-size:13px;font-weight:700;color:var(--navy);flex:0 0 auto;}
  .order-modal-actions{display:flex;gap:8px;padding:14px 18px;flex:0 0 auto;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .admin-header{padding:16px 18px 10px;}
  .admin-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--navy);}
  .admin-sub{font-size:11px;color:var(--muted);margin-top:3px;}
  .alist{padding:6px 18px;display:flex;flex-direction:column;gap:10px;}
  .aitem{border:1px solid var(--line);border-radius:12px;padding:12px 13px;background:#fff;}
  .arow1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
  .aname{font-size:12.5px;font-weight:700;}
  .astatus{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--coral-dim);color:var(--coral);white-space:nowrap;}
  .adetail{font-size:11px;color:var(--muted);line-height:1.6;}
  .adetail b{color:var(--ink);}

  .placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:0 40px;text-align:center;}
  .placeholder .big{font-size:38px;}
  .placeholder .t{font-size:13px;font-weight:700;color:var(--navy);}
  .placeholder .d{font-size:11.5px;line-height:1.6;}

  .footnote{margin-top:16px;max-width:380px;font-size:11.5px;color:var(--muted);line-height:1.7;text-align:center;}
  .footnote b{color:var(--navy);}
  .search-input{margin:0 18px 12px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:13px;font-family:inherit;width:calc(100% - 36px);}
  .search-section{padding:0 18px 20px;}
  .search-section-title{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:10px;}
  .search-clear{font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;}
  .search-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .search-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;background:var(--sand);color:var(--navy);font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--line);}
  .search-chip-x{color:var(--muted);font-size:12px;cursor:pointer;padding:0 2px;line-height:1;}

  .auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 26px;}
  .auth-logo{width:56px;height:56px;margin:0 auto 14px;}
  .auth-logo img{width:100%;height:100%;object-fit:contain;}
  .auth-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:4px;}
  .auth-sub{font-size:11.5px;color:var(--muted);text-align:center;margin-bottom:24px;}
  .auth-field{margin-bottom:12px;}
  .auth-field label{display:block;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;}
  .auth-field input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-family:inherit;color:var(--ink);}
  .auth-error{background:var(--coral-dim);color:var(--coral);font-size:11.5px;font-weight:600;padding:9px 12px;border-radius:10px;margin-bottom:12px;text-align:center;}
  .auth-switch{text-align:center;font-size:12px;color:var(--muted);margin-top:16px;}
  .auth-switch b{color:var(--coral);cursor:pointer;font-weight:700;}
  .auth-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:12px;}

  .account-card{margin:16px 18px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:18px;}
  .account-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--line);}
  .account-row:last-child{border-bottom:none;}
  .account-row b{color:var(--navy);}
  .account-role{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--sand);color:var(--navy);}
  .account-role.admin{background:var(--coral-dim);color:var(--coral);}

  /* [추가됨] ===== PWA 및 모바일 전용 최적화 (이중 스크롤 방지 & 꽉 찬 화면) ===== */
  @media screen and (max-width: 768px) {
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100vw !important;
      height: 100dvh !important; /* 스마트폰 주소창 출렁임까지 막아주는 속성 */
      overflow: hidden !important; /* 웹페이지 출렁임 원천 차단 */
      background-color: var(--card) !important;
      position: fixed !important;
    }
    .stage {
      padding: 0 !important;
      margin: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }
    .stage-label, .footnote, .notch {
      display: none !important; /* 폰 바깥 텍스트와 가짜 노치 숨김 */
    }
    .phone {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      border-radius: 0 !important; /* 둥근 모서리 제거 */
      border: none !important;
      box-shadow: none !important;
    }
    .screen {
      padding-top: 0 !important; /* 노치 영역만큼 띄웠던 여백 제거 */
    }
  }
</style>

function imageFor(p){
  const fid = p.imageId || IMAGE_MAP[p.code];
  return fid ? ('https://drive.google.com/thumbnail?id='+fid+'&sz=w400') : null;
}
function storageTag(storage){
  if(!storage) return '';
  const m = storage.replace('[merged]','').trim();
  return m.split(/[\/\(]/)[0].trim();
}
// 뱃지: 스프레드시트 I열(Badge)에 입력한 문구를 그대로 썸네일 우상단에 노출해요.
// '베스트'/'BEST', '추천'은 전용 색상을 쓰고, 그 외 문구는 기본 색상으로 그대로 표시돼요.
function badgeInfo(p){
  const raw = (p.badge ?? p['뱃지'] ?? p['구분'] ?? p.tag ?? '').toString().trim();
  if(!raw) return null;
  const up = raw.toUpperCase();
  if(raw==='베스트' || raw==='베스트메뉴' || up==='BEST') return {text:'BEST', cls:'tag-best'};
  if(raw==='추천' || raw==='추천메뉴' || up==='RECOMMEND') return {text:'추천', cls:'tag-recommend'};
  return {text:raw, cls:'tag-default'};
}

const ADMIN_EMAILS = ['kojubu3233@gmail.com'];

let firebaseReady = false;
let auth = null;
try{
  if(FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('여기에')){

function isAdminEmail(email){
  return !!email && ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(email.toLowerCase());
}

function doSignup(email, password, orgName){
  state.authError = '';
  if(!email || !password){ state.authError = '이메일과 비밀번호를 입력해주세요.'; renderAuthOnly(); return; }
  if(!orgName){ state.authError = '기관명(거래처명)을 입력해주세요.'; renderAuthOnly(); return; }
  if(password.length < 6){ state.authError = '비밀번호는 6자 이상이어야 해요.'; renderAuthOnly(); return; }
  state.authBusy = true; renderAuthOnly();
  auth.createUserWithEmailAndPassword(email, password)
    .then(cred => cred.user.updateProfile({displayName: orgName}))
    .catch(err => {
      state.authBusy = false;
      state.authError = authErrorMessage_(err);
      renderAuthOnly();
    });
}
function doLogin(email, password){
  state.authError = '';
  if(!email || !password){ state.authError = '이메일과 비밀번호를 입력해주세요.'; renderAuthOnly(); return; }
  state.authBusy = true; renderAuthOnly();
  auth.signInWithEmailAndPassword(email, password)
    .catch(err => {
      state.authBusy = false;
      state.authError = authErrorMessage_(err);
      renderAuthOnly();
    });
}
function doLogout(){
  auth.signOut();
}
function authErrorMessage_(err){
  const code = err && err.code || '';
  if(code.includes('email-already-in-use')) return '이미 가입된 이메일이에요.';
  if(code.includes('invalid-email')) return '이메일 형식이 올바르지 않아요.';
  if(code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return '이메일 또는 비밀번호가 올바르지 않아요.';
  if(code.includes('weak-password')) return '비밀번호는 6자 이상이어야 해요.';
  return '오류가 발생했어요. 잠시 후 다시 시도해주세요. (' + code + ')';
}
function switchAuthMode(mode){
  state.authMode = mode;
  state.authError = '';
  renderAuthOnly();
}

let PRODUCTS = FALLBACK_PRODUCTS;
let DATA_SOURCE = 'offline';
let LAST_ERROR = '';

function fetchOnce_(){
  const bustUrl = SHEET_API_URL + (SHEET_API_URL.includes('?') ? '&' : '?') + '_ts=' + Date.now();
  return fetch(bustUrl, { cache: 'no-store' }).then(res=>{
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function wait_(ms){ return new Promise(r=>setTimeout(r, ms)); }

async function loadProducts(){
  if(!SHEET_API_URL){
    DATA_SOURCE = 'offline';
    render();
    return;
  }
  DATA_SOURCE = 'loading';
  render();
  try{
    let data;
    try{
      data = await fetchOnce_();
    }catch(firstErr){
      console.warn('1차 연동 실패, 1.2초 후 재시도:', firstErr);
      await wait_(1200);
      data = await fetchOnce_();
    }
    if(!data.products || !data.products.length) throw new Error('빈 응답');
    PRODUCTS = data.products;
    DATA_SOURCE = 'live';
    LAST_ERROR = '';
  }catch(err){
    console.error('시트 연동 실패, 스냅샷 데이터로 대체합니다:', err);
    PRODUCTS = FALLBACK_PRODUCTS;
    DATA_SOURCE = 'offline';
    LAST_ERROR = (err && err.message) ? err.message : String(err);
  }
  state.currentPage = 1;
  render();
}

function extractDriveId_(v){
  if(!v) return null;
  const s = String(v).trim();
  const m1 = s.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if(m1) return m1[1];
  const m2 = s.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if(m2) return m2[1];
  return s;
}
function bannerImage(b){
  const id = extractDriveId_(b.imageId);
  return id ? ('https://drive.google.com/thumbnail?id='+id+'&sz=w800') : null;
}

  if(!/^\d{4}-\d{2}-\d{2}$/.test(v)) return false;
  const d = new Date(v+'T00:00:00');
  return !isNaN(d.getTime());

// "AM06:00" 같은 짧은 시간 라벨
function deliveryTimeLabel(period, hour){
  const p = period || 'AM';
  const h = String(hour || 6).padStart(2,'0');
  return `${p}${h}:00`;
}
// "2026.7.9 AM06:00까지" 같은 간소화된 표시용 라벨. 날짜 파싱에 실패하면 원본 문자열을 그대로 보여줘요.
function deliveryFullLabel(dateStr, period, hour){
  if(!dateStr) return '';
  let d;
  if(/^\d{4}-\d{2}-\d{2}/.test(dateStr)) d = new Date(dateStr.slice(0,10)+'T00:00:00');
  else d = new Date(dateStr);
  if(!d || isNaN(d.getTime())) return `${dateStr} ${deliveryTimeLabel(period,hour)}까지`;
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${deliveryTimeLabel(period,hour)}까지`;
}
// 관리자 페이지: 스프레드시트에서 온 원본 날짜 문자열(긴 GMT 형식 등)도 간소화해서 표시
function formatAdminDeliveryLabel(a){
  const raw = a.deliveryDate;
  let d;
  if(raw && /^\d{4}-\d{2}-\d{2}/.test(raw)) d = new Date(raw.slice(0,10)+'T00:00:00');
  else if(raw) d = new Date(raw);
  const dateLabel = (d && !isNaN(d.getTime())) ? `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}` : (raw||'');
  const timeLabel = a.deliveryTime || deliveryTimeLabel('AM',6);
  return `${dateLabel} ${timeLabel}까지`;
}

function addToCart(){

  const p = findProduct(state.detailId);
  const existing = state.cart.find(c=>c.productId===p.uid && c.deliveryDate===state.deliveryDate && (c.deliveryPeriod||'AM')===state.deliveryPeriod && (c.deliveryHour||6)===state.deliveryHour && (c.orderType||'planned')===state.orderType);
  if(existing){ existing.qty += state.qty; }
  else { state.cart.push({productId:p.uid, qty:state.qty, deliveryDate:state.deliveryDate, deliveryPeriod:state.deliveryPeriod, deliveryHour:state.deliveryHour, orderType:state.orderType}); }
  showToast(p.name+' 장바구니에 담았어요','🛒');
  render();
}

async function confirmSubmitOrder(){
  state.showOrderConfirm = false;
  const now = new Date();
  const timeLabel = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const orderItems = state.cart.map(c=>{
    const p = findProduct(c.productId);
    const deliveryTime = deliveryTimeLabel(c.deliveryPeriod||'AM', c.deliveryHour||6);
    const orderType = c.orderType||'planned';
    return { name:p.name, code:p.code, qty:c.qty, deliveryDate:c.deliveryDate, deliveryTime, orderType, orderTypeLabel:orderTypeShort(orderType), price:p.price*c.qty };
  });
  orderItems.forEach(item=>{
    state.adminLog.unshift({
      name:item.name, qty:item.qty, deliveryDate:item.deliveryDate, deliveryTime:item.deliveryTime, orderType:item.orderType, price:item.price, time:timeLabel, status:'신규'
    });

function removeAdminLog(idx){

  state.selectedOrderIds = state.selectedOrderIds.filter(id=>id!==o.id);
  render();
}
function clearAdminLog(){
  state.remoteOrders.forEach(o=>addDismissedId_(o.id));
  state.remoteOrders = [];

function toggleOrderSelect(id, checked){
  if(checked){ if(!state.selectedOrderIds.includes(id)) state.selectedOrderIds.push(id); }
  else{ state.selectedOrderIds = state.selectedOrderIds.filter(x=>x!==id); }
  render();
}
function toggleSelectAllOrders(checked){
  state.selectedOrderIds = checked ? state.remoteOrders.filter(o=>o.status!=='확인').map(o=>o.id) : [];

}
async function confirmSelectedOrders(){
  if(state.selectedOrderIds.length===0){ showToast('선택된 발주가 없어요','⚠️'); return; }
  if(!SHEET_API_URL){ showToast('시트 연동이 설정되어 있지 않아요','⚠️'); return; }
  const ids = state.selectedOrderIds.slice();
  try{
    const res = await fetch(SHEET_API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'confirm', ids })
    });
    const data = await res.json();
    if(!data || data.ok===false){
      console.error('확인 처리 실패 응답:', data);
      showToast('⚠️ 확인 처리에 실패했어요. Apps Script에 확인 처리 기능이 있는지 확인해주세요','⚠️');
      return;
    }
    state.remoteOrders.forEach(o=>{ if(ids.includes(o.id)) o.status='확인'; });
    state.pendingOrderCount = state.remoteOrders.filter(o=>o.status==='신규').length;
    state.selectedOrderIds = [];
    showToast(ids.length+'건 확인 처리했어요','✅');
    render();
  }catch(err){
    console.error('확인 처리 실패 (네트워크/CORS):', err);
    showToast('⚠️ 확인 처리 중 오류가 발생했어요','⚠️');
  }
}

function paginate(list){
  const size = state.pageSize==='all' ? list.length : state.pageSize;
  const totalPages = Math.max(1, Math.ceil(list.length/size));
  const page = Math.min(state.currentPage, totalPages);
  const start = (page-1)*size;
  const pageItems = state.pageSize==='all' ? list : list.slice(start, start+size);
  return { pageItems, totalPages, page };
}

function paginationBar(totalPages, page){
  if(totalPages<=1) return '';
  return `
    <div class="pagination">
      <button onclick="goToPage(${page-1})" ${page<=1?'disabled':''}>‹</button>
      <div class="pg-label">${page} / ${totalPages} 페이지</div>
      <button onclick="goToPage(${page+1})" ${page>=totalPages?'disabled':''}>›</button>
    </div>`;
}

const POPULAR_SEARCHES = ['어묵','갈비','계란말이','두부','순대','새우','국탕'];
function getRecentSearches(){
  try{ return JSON.parse(localStorage.getItem('kojubu_recent_searches')||'[]'); }
  catch(e){ return []; }
}
function saveRecentSearch(term){
  term = (term||'').trim();
  if(!term) return;
  let list = getRecentSearches().filter(t=>t!==term);
  list.unshift(term);
  list = list.slice(0,8);
  try{ localStorage.setItem('kojubu_recent_searches', JSON.stringify(list)); }catch(e){}
}
function removeRecentSearch(term){
  const list = getRecentSearches().filter(t=>t!==term);
  try{ localStorage.setItem('kojubu_recent_searches', JSON.stringify(list)); }catch(e){}
  renderSearchListOnly();
}
function clearRecentSearches(){
  try{ localStorage.removeItem('kojubu_recent_searches'); }catch(e){}
  renderSearchListOnly();
}
function selectSearchTerm(term){
  const input = document.querySelector('.search-input');
  if(input) input.value = term;
  state.searchTerm = term;
  saveRecentSearch(term);
  renderSearchListOnly();
}
function submitSearch(term){
  saveRecentSearch(term);
  renderSearchListOnly();
}

function renderSearch(){
  return `
    <div class="topbar"><div class="brand" onclick="goHome()">‹ 검색</div><div></div></div>
    <input class="search-input" placeholder="상품명으로 검색 (예: 어묵, 갈비)" value="${state.searchTerm||''}" oninput="setSearch(this.value)" onkeydown="if(event.key==='Enter'){submitSearch(this.value);}" autofocus>

function renderSearchListOnly(){
  const box = document.getElementById('searchResults');

  if(!term){

    box.className = '';
    box.innerHTML = `
      ${recent.length ? `
      <div class="search-section">
        <div class="search-section-title"><span>최근 검색어</span><span class="search-clear" onclick="clearRecentSearches()">전체삭제</span></div>
        <div class="search-chips">
          ${recent.map(t=>`
            <div class="search-chip" onclick="selectSearchTerm('${t.replace(/'/g,"\\'")}')">
              <span>${t}</span>
              <span class="search-chip-x" onclick="event.stopPropagation();removeRecentSearch('${t.replace(/'/g,"\\'")}')">×</span>
            </div>`).join('')}
        </div>
      </div>` : ''}
      <div class="search-section">
        <div class="search-section-title"><span>추천 검색어</span></div>
        <div class="search-chips">
          ${POPULAR_SEARCHES.map(t=>`<div class="search-chip" onclick="selectSearchTerm('${t}')">${t}</div>`).join('')}
        </div>
      </div>
    `;
    return;
  }

  const results = PRODUCTS.filter(p=>p.name.includes(term));
  box.className = 'grid';
  box.innerHTML = results.length
    ? results.map(productCard).join('')
    : '<div class="empty" style="grid-column:1/-1;"><div class="big">🔎</div>검색 결과가 없어요.</div>';

function renderAdmin(){
  const selectableCount = state.remoteOrders.filter(o=>o.status!=='확인').length;
  const allSelected = selectableCount>0 && state.selectedOrderIds.length===selectableCount;
  return `
    <div class="admin-header">
      <div class="admin-title" onclick="goHome()" style="cursor:pointer;">‹ 관리자 페이지</div>
      <div class="admin-sub">모든 기기에서 들어온 발주 요청을 스프레드시트에서 실시간으로 불러와요. (여기서 삭제해도 시트 원본은 그대로 남아요)</div>
      <div style="display:flex;gap:14px;margin-top:8px;">
        <div class="search-clear" style="cursor:pointer;" onclick="goAdmin()">🔄 새로고침</div>
        ${state.remoteOrders.length>0 ? `<div class="search-clear" style="cursor:pointer;" onclick="clearAdminLog()">화면에서 전체 지우기</div>` : ''}
      </div>
    </div>
    ${state.ordersLoading ? `
      <div class="empty"><div class="big">⏳</div>불러오는 중...</div>
    ` : state.ordersError ? `
      <div class="empty">
        <div class="big">⚠️</div>
        발주 목록을 불러오지 못했어요.<br>Apps Script가 최신 코드로 재배포됐는지 확인해주세요.
      </div>
    ` : state.remoteOrders.length===0 ? `
      <div class="empty">
        <div class="big">📋</div>
        아직 접수된 발주 요청이 없어요.
      </div>
    ` : `
      <div class="admin-select-bar">
        <label class="admin-select-left">
          <input type="checkbox" ${allSelected?'checked':''} ${selectableCount===0?'disabled':''} onchange="toggleSelectAllOrders(this.checked)">
          전체선택 (${selectableCount}건)
        </label>
        <button class="admin-confirm-btn" ${state.selectedOrderIds.length===0?'disabled':''} onclick="confirmSelectedOrders()">선택 확인 (${state.selectedOrderIds.length})</button>
      </div>
      <div class="alist">
        ${state.remoteOrders.map((a,idx)=>`
          <div class="aitem">
            <div class="arow1">
              <div class="aitem-check">
                ${a.status!=='확인' ? `<input type="checkbox" ${state.selectedOrderIds.includes(a.id)?'checked':''} onchange="toggleOrderSelect('${a.id}', this.checked)">` : `<div style="width:17px;"></div>`}
                <div class="aname"><span class="ordertype-badge ${a.orderType||'planned'}">${orderTypeShort(a.orderType)}</span>${a.name}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;">
                <div class="astatus ${a.status==='확인'?'done':''}">${a.status==='확인'?'확인완료':a.status}</div>
                <div class="cremove-x" onclick="removeAdminLog(${idx})">×</div>
              </div>
            </div>
            <div class="adetail">
              <b>${a.org || '기관 미상'}</b> · ${a.email}<br>
              수량 <b>${a.qty}</b> · 납품 <b>${formatAdminDeliveryLabel(a)}</b> · 금액 <b>${money(a.price)}원</b><br>
              접수 시각 ${a.time}
            </div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

function renderPlaceholder(){
  return `
    <div class="topbar"><div class="brand" onclick="goHome()">‹ 홈으로</div><div></div></div>
    <div class="placeholder">
      <div class="big">🛠️</div>
      <div class="t">다음 단계에서 만들 화면이에요</div>
      <div class="d">이 화면은 나중에 이어서 만들기로 했어요.</div>
    </div>
  `;
}

function renderAuth(){
  if(!firebaseReady){
    return `
      <div class="auth-wrap">
        <div class="auth-title">⚠️ 로그인 설정 필요</div>
        <div class="auth-sub" style="line-height:1.8;">
          Firebase 설정값이 아직 코드에 입력 안 됐어요.<br>
          FIREBASE_CONFIG 자리에 실제 값을 넣어야 로그인 기능이 켜져요.
        </div>
      </div>
    `;
  }
  const isSignup = state.authMode==='signup';
  return `
    <div class="auth-wrap" style="position:relative;">
      <div class="back" onclick="state.screen=state.screenBeforeAuth||'home'; render();">‹</div>
      <div class="auth-logo"><img src="${LOGO_SRC}" alt="코주부씨앤에프 로고"></div>
      <div class="auth-title">코주부씨앤에프 발주 시스템</div>
      <div class="auth-sub">${isSignup ? '거래처 정보를 입력하고 가입해주세요' : '로그인 후 발주를 진행해주세요'}</div>

      ${state.authError ? `<div class="auth-error">⚠️ ${state.authError}</div>` : ''}

      ${isSignup ? `
      <div class="auth-field">
        <label>기관명 / 거래처명</label>
        <input id="authOrg" type="text" placeholder="예: 코주부초등학교 급식실">
      </div>` : ''}
      <div class="auth-field">
        <label>이메일</label>
        <input id="authEmail" type="email" placeholder="example@email.com">
      </div>
      <div class="auth-field">
        <label>비밀번호</label>
        <input id="authPassword" type="password" placeholder="6자 이상" onkeydown="if(event.key==='Enter'){submitAuthForm()}">
      </div>

      <button class="btn btn-solid btn-full" style="margin-top:6px;flex:none;" onclick="submitAuthForm()" ${state.authBusy?'disabled':''}>
        ${state.authBusy ? '처리 중...' : (isSignup ? '가입하기' : '로그인')}
      </button>

      <div class="auth-switch">
        ${isSignup
          ? `이미 계정이 있으신가요? <b onclick="switchAuthMode('login')">로그인</b>`
          : `아직 계정이 없으신가요? <b onclick="switchAuthMode('signup')">회원가입</b>`}
      </div>
    </div>
  `;
}
function submitAuthForm(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if(state.authMode==='signup'){
    const orgEl = document.getElementById('authOrg');
    doSignup(email, password, orgEl ? orgEl.value.trim() : '');
  }else{
    doLogin(email, password);
  }
}

function renderAccount(){
  const u = state.currentUser;
  if(!u){
    return `
      <div class="topbar"><div class="brand" onclick="goHome()">‹ 마이페이지</div><div></div></div>
      <div class="placeholder">
        <div class="big">👤</div>
        <div class="t">로그인이 필요해요</div>
        <div class="d">발주 요청을 보내거나 마이페이지를 이용하려면 로그인해주세요.</div>
        <button class="btn btn-solid" style="margin-top:16px;padding-left:24px;padding-right:24px;flex:none;" onclick="state.screenBeforeAuth='account'; state.screen='auth'; render();">로그인 / 회원가입</button>
      </div>
    `;
  }
  return `
    <div class="topbar"><div class="brand" onclick="goHome()">‹ 마이페이지</div><div></div></div>
    <div class="account-card">
      <div class="account-row"><span>기관명</span><b>${u.displayName ? u.displayName : '(미입력)'}</b></div>
      <div class="account-row"><span>이메일</span><b>${u.email}</b></div>
      <div class="account-row"><span>권한</span><span class="account-role ${state.isAdmin?'admin':''}">${state.isAdmin?'관리자':'일반 거래처'}</span></div>
    </div>
    <div style="padding:0 18px;">
      <button class="btn btn-outline btn-full" onclick="doLogout()">로그아웃</button>
    </div>
  `;
}

function renderMyOrders(){
  if(!state.currentUser){
    return `
      <div class="topbar"><div class="brand" onclick="goHome()">‹ 내 발주 현황</div><div></div></div>
      <div class="placeholder">
        <div class="big">🧾</div>
        <div class="t">로그인이 필요해요</div>
        <div class="d">내가 보낸 발주 현황과 관리자 확인 여부를 보려면 로그인해주세요.</div>
        <button class="btn btn-solid" style="margin-top:16px;padding-left:24px;padding-right:24px;flex:none;" onclick="state.screenBeforeAuth='myorders'; state.screen='auth'; render();">로그인 / 회원가입</button>
      </div>
    `;
  }
  const allSelected = state.myOrders.length>0 && state.selectedMyOrderIds.length===state.myOrders.length;
  return `
    <div class="admin-header">
      <div class="admin-title" onclick="goHome()" style="cursor:pointer;">‹ 내 발주 현황</div>
      <div class="admin-sub">관리자가 확인했는지 여기서 볼 수 있어요. (화면에서 삭제해도 실제 발주 기록은 그대로 남아있어요)</div>
      <div style="display:flex;gap:14px;margin-top:8px;">
        <div class="search-clear" style="cursor:pointer;" onclick="goMyOrders()">🔄 새로고침</div>
        ${state.myOrders.length>0 ? `<div class="search-clear" style="cursor:pointer;" onclick="clearMyOrders()">전체삭제</div>` : ''}
      </div>
    </div>
    ${state.myOrdersLoading ? `
      <div class="empty"><div class="big">⏳</div>불러오는 중...</div>
    ` : state.myOrdersError ? `
      <div class="empty">
        <div class="big">⚠️</div>
        발주 내역을 불러오지 못했어요.<br>잠시 후 새로고침 해주세요.
      </div>
    ` : (!state.myOrders || state.myOrders.length===0) ? `
      <div class="empty">
        <div class="big">📋</div>
        아직 보낸 발주 요청이 없어요.
      </div>
    ` : `
      <div class="admin-select-bar">
        <label class="admin-select-left">
          <input type="checkbox" ${allSelected?'checked':''} onchange="toggleSelectAllMyOrders(this.checked)">
          전체선택
        </label>
        <button class="admin-confirm-btn" style="background:var(--coral);" ${state.selectedMyOrderIds.length===0?'disabled':''} onclick="removeSelectedMyOrders()">선택삭제 (${state.selectedMyOrderIds.length})</button>
      </div>
      <div class="alist" style="padding-bottom:20px;">
        ${state.myOrders.map(o=>`
          <div class="aitem">
            <div class="arow1">
              <div class="aitem-check">
                <input type="checkbox" ${state.selectedMyOrderIds.includes(o.id)?'checked':''} onchange="toggleMyOrderSelect('${o.id}', this.checked)">
                <div class="aname"><span class="ordertype-badge ${o.orderType||'planned'}">${orderTypeShort(o.orderType)}</span>${o.name}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;">
                <div class="astatus ${o.status==='확인'?'done':''}">${o.status==='확인'?'✅ 확인완료':'⏳ 확인대기'}</div>
                <div class="cremove-x" onclick="removeMyOrder('${o.id}')">×</div>
              </div>
            </div>
            <div class="adetail">
              수량 <b>${o.qty}</b> · 납품 <b>${formatAdminDeliveryLabel(o)}</b> · 금액 <b>${money(o.price)}원</b><br>
              접수 시각 ${o.time}
            </div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

function navbar(){
  const active = state.screen;
  const items = [
    {key:'home', ico:'🏠', label:'홈', onClick:'goHome()'},
    {key:'search', ico:'🔍', label:'검색', onClick:'goSearch()'},
    {key:'cart', ico:'🧺', label:'장바구니', onClick:'goCart()'},
    {key:'myorders', ico:'🧾', label:'내발주', onClick:'goMyOrders()'},
    {key:'account', ico:'👤', label:'마이', onClick:"goAccount()"},
  ];
  return `
    <div class="navbar">
      ${items.map(it=>{
        const isCart = it.key==='cart';
        const count = state.cart.length;
        return `
        <div class="navitem ${active===it.key?'active':''}" onclick="${it.onClick}">
          <div class="ico ${isCart?'cart-count':''}">${it.ico}${isCart&&count>0?`<span class="dot">${count}</span>`:''}</div>
          <div>${it.label}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function initApp(){
  loadAppState();
  loadProducts();
}

// 로그인 여부와 상관없이 앱은 바로 열람 가능 (구경/장바구니 담기까지는 자유롭게).
// 로그인 상태만 별도로 추적했다가, 실제 "발주 요청 보내기" 시점에만 로그인을 요구해요.
initApp();

if(firebaseReady){
  auth.onAuthStateChanged(function(user){
    if(user){
      state.currentUser = user;
      state.isAdmin = isAdminEmail(user.email);
      if(state.screen==='auth'){
        state.screen = state.screenBeforeAuth || 'home';
        showToast('로그인됐어요','✅');
        if(state.screen==='myorders'){
          state.myOrdersLoading = true;
          state.myOrdersError = false;
          loadOrdersFromSheet_().then(list=>{
            const mine = list.filter(o=>o.email===user.email);
            state.myOrders = applyMyDismissed_(mine);
            state.myOrdersLoading = false;
            render();
          }).catch(err=>{
            console.error('내 발주 조회 실패:', err);
            state.myOrdersLoading = false;
            state.myOrdersError = true;
            render();
          });
        }
      }
      if(state.isAdmin){
        refreshAdminBadge();
        if(!window.__adminBadgeTimer){
          window.__adminBadgeTimer = setInterval(refreshAdminBadge, 30000); // 30초마다 새 발주 확인
        }
      }
    }else{
      state.currentUser = null;
      state.isAdmin = false;
      state.pendingOrderCount = 0;
      if(window.__adminBadgeTimer){ clearInterval(window.__adminBadgeTimer); window.__adminBadgeTimer = null; }
    }
    state.authBusy = false;
    render();
  });
}
</script>
</body>
</html>
